<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職位並び替えクイズ｜昇格ルーレット</title>
  <meta name="description" content="会社の職位（主任・係長・課長など）を正しい役職順に並び替えるクイズアプリです。" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans JP"', 'sans-serif'],
          },
          animation: {
            'shake': 'shake 0.4s ease-in-out',
            'pop': 'pop 0.3s ease-out',
            'celebrate': 'celebrate 0.6s ease-out',
            'fadeIn': 'fadeIn 0.5s ease-out',
            'slideUp': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            shake: {
              '0%, 100%': { transform: 'translateX(0)' },
              '25%': { transform: 'translateX(-8px)' },
              '75%': { transform: 'translateX(8px)' },
            },
            pop: {
              '0%': { transform: 'scale(0.8)', opacity: '0' },
              '70%': { transform: 'scale(1.05)' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            celebrate: {
              '0%': { transform: 'scale(0.5) rotate(-10deg)', opacity: '0' },
              '60%': { transform: 'scale(1.1) rotate(3deg)' },
              '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .drag-over {
      background: rgba(99, 102, 241, 0.1) !important;
      border-color: #6366f1 !important;
      transform: scale(1.02);
    }
    .dragging {
      opacity: 0.4;
      transform: scale(0.95);
    }
    .card-correct {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5) !important;
      border-color: #10b981 !important;
    }
    .card-wrong {
      background: linear-gradient(135deg, #fef2f2, #fee2e2) !important;
      border-color: #ef4444 !important;
    }
    .rank-badge {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }
    .hero-gradient {
      background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 50%, #fdf2f8 100%);
    }
    .card-base {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-base:hover:not(.card-correct):not(.card-wrong) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.15);
    }
    .progress-bar {
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    .hint-badge {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 2px solid #f59e0b;
    }
  </style>
</head>
<body class="hero-gradient min-h-screen">

  <!-- ヘッダー -->
  <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🏢</span>
        <div>
          <h1 class="text-base font-black text-gray-800 leading-tight">職位並び替えクイズ</h1>
          <p class="text-xs text-gray-400">Role Ranking Quiz</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <div id="scoreDisplay" class="hidden bg-indigo-50 border border-indigo-200 rounded-full px-3 py-1">
          <span class="text-xs font-bold text-indigo-600">スコア: <span id="scoreVal">0</span>点</span>
        </div>
        <button id="helpBtn" class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 text-sm font-bold hover:bg-indigo-100 hover:text-indigo-600 transition-all">?</button>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="max-w-3xl mx-auto px-4 py-8">

    <!-- ヒーロー -->
    <div class="text-center mb-8 animate-fadeIn">
      <div class="inline-flex items-center gap-2 bg-indigo-50 border border-indigo-200 rounded-full px-4 py-2 mb-4">
        <span class="text-sm">🎯</span>
        <span class="text-sm font-medium text-indigo-700">役職の序列クイズ</span>
      </div>
      <h2 class="text-2xl md:text-3xl font-black text-gray-800 mb-2">正しい順番に並び替えよう！</h2>
      <p class="text-gray-500 text-sm">下の職位カードをドラッグして、<strong class="text-indigo-600">高い順（上）→ 低い順（下）</strong>に並べてください</p>
    </div>

    <!-- ゲームエリア -->
    <div id="gameArea" class="animate-slideUp">

      <!-- 進捗バー -->
      <div class="flex items-center justify-between mb-3">
        <span class="text-xs font-medium text-gray-500">並び替え進捗</span>
        <span class="text-xs font-medium text-indigo-600" id="progressText">0 / 8</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
        <div id="progressBar" class="progress-bar bg-gradient-to-r from-indigo-400 to-purple-400 h-2 rounded-full" style="width: 0%"></div>
      </div>

      <!-- ドロップゾーン -->
      <div id="dropZone" class="space-y-2 mb-6">
        <!-- JSで生成 -->
      </div>

      <!-- ボタン群 -->
      <div class="flex flex-wrap gap-3 justify-center">
        <button id="checkBtn" onclick="checkAnswer()"
          class="flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold px-6 py-3 rounded-xl shadow-md hover:shadow-lg transition-all text-sm active:scale-95">
          <span>✅</span> 答え合わせ
        </button>
        <button onclick="resetGame()"
          class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold px-5 py-3 rounded-xl transition-all text-sm active:scale-95">
          <span>🔄</span> リセット
        </button>
      </div>
    </div>

    <!-- 結果パネル -->
    <div id="resultPanel" class="hidden mt-8 animate-pop">
      <!-- JSで内容生成 -->
    </div>

  </main>

  <!-- ヘルプモーダル -->
  <div id="helpModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 animate-pop">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-black text-gray-800">🏢 遊び方</h3>
        <button onclick="document.getElementById('helpModal').classList.add('hidden')"
          class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 transition-all text-sm">✕</button>
      </div>
      <ol class="space-y-3 text-sm text-gray-600">
        <li class="flex gap-2"><span class="font-bold text-indigo-500 shrink-0">①</span> カードをドラッグして並び替える</li>
        <li class="flex gap-2"><span class="font-bold text-indigo-500 shrink-0">②</span> 役職の高い順（上）→ 低い順（下）に並べる</li>
        <li class="flex gap-2"><span class="font-bold text-indigo-500 shrink-0">③</span>「答え合わせ」ボタンで正解を確認</li>
        <li class="flex gap-2"><span class="font-bold text-indigo-500 shrink-0">④</span> 全部正解で満点！</li>
      </ol>
      <div class="mt-4 bg-indigo-50 rounded-xl p-3">
        <p class="text-xs font-bold text-indigo-700">採点方式</p>
        <p class="text-xs text-indigo-600 mt-1">正しい位置にあるカード1枚につき10点。全部正解で80点！</p>
      </div>
    </div>
  </div>

  <canvas class="confetti" id="confettiCanvas"></canvas>

  <script>
    // ============================
    // 職位データ（正解順：高い順）
    // ============================
    const CORRECT_ORDER = [
      { name: '社長', emoji: '🏆', level: 8, desc: '最高経営責任者' },
      { name: '副社長', emoji: '👑', level: 7, desc: '社長補佐' },
      { name: '専務', emoji: '🌟', level: 6, desc: '専務取締役' },
      { name: '常務', emoji: '⭐', level: 5, desc: '常務取締役' },
      { name: '部長', emoji: '🗂️', level: 4, desc: '部門の責任者' },
      { name: '課長', emoji: '💼', level: 3, desc: '課のマネージャー' },
      { name: '係長', emoji: '📋', level: 2, desc: '係のリーダー' },
      { name: '主任', emoji: '🌱', level: 1, desc: 'エントリー管理職' },
    ];

    let currentOrder = [];
    let dragSrcIndex = null;
    let checked = false;

    // ============================
    // シャッフル
    // ============================
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      // 正解と違う並びにする
      if (JSON.stringify(a.map(x => x.level)) === JSON.stringify(CORRECT_ORDER.map(x => x.level))) {
        return shuffle(arr);
      }
      return a;
    }

    // ============================
    // 初期化
    // ============================
    function initGame() {
      checked = false;
      currentOrder = shuffle(CORRECT_ORDER);
      renderDropZone();
      if (document.getElementById('resultPanel')) document.getElementById('resultPanel').classList.add('hidden');
      document.getElementById('checkBtn').disabled = false;
      document.getElementById('checkBtn').classList.remove('opacity-50');
      document.getElementById('scoreDisplay').classList.add('hidden');
      updateProgress();
    }

    // ============================
    // ドロップゾーン描画
    // ============================
    function renderDropZone() {
      const zone = document.getElementById('dropZone');
      zone.innerHTML = '';
      currentOrder.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'card-base flex items-center gap-3 bg-white border-2 border-gray-200 rounded-xl px-4 py-3 cursor-grab shadow-sm select-none';
        div.draggable = true;
        div.dataset.index = i;
        div.innerHTML = `
          <div class="flex items-center gap-1 text-gray-300">
            <svg width="14" height="20" viewBox="0 0 14 20" fill="currentColor">
              <circle cx="4" cy="4" r="2"/><circle cx="10" cy="4" r="2"/>
              <circle cx="4" cy="10" r="2"/><circle cx="10" cy="10" r="2"/>
              <circle cx="4" cy="16" r="2"/><circle cx="10" cy="16" r="2"/>
            </svg>
          </div>
          <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-400">${i + 1}</div>
          <span class="text-xl">${item.emoji}</span>
          <span class="font-bold text-gray-800 text-lg">${item.name}</span>
          <span class="ml-auto text-xs text-gray-400 hidden md:block">${item.desc}</span>
        `;
        div.addEventListener('dragstart', onDragStart);
        div.addEventListener('dragover', onDragOver);
        div.addEventListener('drop', onDrop);
        div.addEventListener('dragend', onDragEnd);
        div.addEventListener('dragleave', onDragLeave);
        // タッチ用
        div.addEventListener('touchstart', onTouchStart, { passive: true });
        div.addEventListener('touchmove', onTouchMove, { passive: false });
        div.addEventListener('touchend', onTouchEnd);
        zone.appendChild(div);
      });
    }

    // ============================
    // ドラッグ＆ドロップ（PC）
    // ============================
    function onDragStart(e) {
      dragSrcIndex = parseInt(this.dataset.index);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.classList.add('drag-over');
    }
    function onDragLeave() {
      this.classList.remove('drag-over');
    }
    function onDrop(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      const targetIndex = parseInt(this.dataset.index);
      if (dragSrcIndex === targetIndex) return;
      const moved = currentOrder.splice(dragSrcIndex, 1)[0];
      currentOrder.splice(targetIndex, 0, moved);
      renderDropZone();
      updateProgress();
    }
    function onDragEnd() {
      document.querySelectorAll('#dropZone > div').forEach(d => {
        d.classList.remove('dragging', 'drag-over');
      });
    }

    // ============================
    // タッチ操作（スマホ）
    // ============================
    let touchSrcIndex = null;
    let touchClone = null;
    let touchOffsetX = 0;
    let touchOffsetY = 0;

    function onTouchStart(e) {
      touchSrcIndex = parseInt(this.dataset.index);
      const touch = e.touches[0];
      const rect = this.getBoundingClientRect();
      touchOffsetX = touch.clientX - rect.left;
      touchOffsetY = touch.clientY - rect.top;
      touchClone = this.cloneNode(true);
      touchClone.style.cssText = `
        position: fixed; z-index: 999; opacity: 0.85; pointer-events: none;
        width: ${rect.width}px; left: ${rect.left}px; top: ${rect.top}px;
        border: 2px solid #6366f1; border-radius: 12px; background: white;
        box-shadow: 0 15px 40px rgba(99,102,241,0.25);
        transform: scale(1.05);
      `;
      document.body.appendChild(touchClone);
      this.style.opacity = '0.3';
    }
    function onTouchMove(e) {
      e.preventDefault();
      if (!touchClone) return;
      const touch = e.touches[0];
      touchClone.style.left = (touch.clientX - touchOffsetX) + 'px';
      touchClone.style.top = (touch.clientY - touchOffsetY) + 'px';
    }
    function onTouchEnd(e) {
      if (!touchClone) return;
      touchClone.remove();
      touchClone = null;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const card = el?.closest('[data-index]');
      if (card) {
        const targetIndex = parseInt(card.dataset.index);
        if (touchSrcIndex !== null && touchSrcIndex !== targetIndex) {
          const moved = currentOrder.splice(touchSrcIndex, 1)[0];
          currentOrder.splice(targetIndex, 0, moved);
          renderDropZone();
          updateProgress();
        }
      }
      document.querySelectorAll('#dropZone > div').forEach(d => d.style.opacity = '');
      touchSrcIndex = null;
    }

    // ============================
    // 進捗更新
    // ============================
    function updateProgress() {
      let correct = 0;
      currentOrder.forEach((item, i) => {
        if (item.level === CORRECT_ORDER[i].level) correct++;
      });
      const pct = Math.round((correct / 8) * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${correct} / 8`;
    }

    // ============================
    // 答え合わせ
    // ============================
    function checkAnswer() {
      if (checked) return;
      
      const pw = prompt("認証パスワードを入力してください：");
      if (pw !== "shokui") {
        alert("パスワードが正しくありません。");
        return;
      }

      checked = true;
      document.getElementById('checkBtn').disabled = true;
      document.getElementById('checkBtn').classList.add('opacity-50');

      let score = 0;
      const cards = document.querySelectorAll('#dropZone > div');
      cards.forEach((card, i) => {
        const item = currentOrder[i];
        if (item.level === CORRECT_ORDER[i].level) {
          card.classList.add('card-correct');
          score += 10;
        } else {
          card.classList.add('card-wrong');
          card.classList.add('animate-shake');
          setTimeout(() => card.classList.remove('animate-shake'), 500);
        }
      });

      // スコア表示
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('scoreDisplay').classList.remove('hidden');

      // 結果パネル
      showResult(score);

      // 全問正解ならコンフェッティ
      if (score === 80) {
        setTimeout(launchConfetti, 300);
      }
    }

    // ============================
    // 結果パネル
    // ============================
    function showResult(score) {
      const panel = document.getElementById('resultPanel');
      const pct = Math.round((score / 80) * 100);

      let emoji, title, color, msg;
      if (score === 80) {
        emoji = '🎉'; title = '完璧！満点！'; color = 'from-emerald-50 to-teal-50 border-emerald-300';
        msg = 'すべての職位を正しく並べることができました！昇格の道を極めましたね！';
      } else if (score >= 60) {
        emoji = '😊'; title = 'よくできました！'; color = 'from-blue-50 to-indigo-50 border-blue-300';
        msg = 'あと少し！間違っている位置を再考してみましょう。';
      } else if (score >= 40) {
        emoji = '🤔'; title = 'まずまず！'; color = 'from-amber-50 to-yellow-50 border-amber-300';
        msg = '職位の序列はなかなか難しいですね。もう一度挑戦！';
      } else {
        emoji = '😅'; title = 'もう一度！'; color = 'from-red-50 to-orange-50 border-red-300';
        msg = '正しい序列を確認して、再チャレンジしてみましょう！';
      }

      panel.innerHTML = `
        <div class="bg-gradient-to-br ${color} border-2 rounded-2xl p-6 text-center animate-pop">
          <div class="text-5xl mb-3">${emoji}</div>
          <h3 class="text-2xl font-black text-gray-800 mb-1">${title}</h3>
          <div class="text-4xl font-black text-indigo-600 mb-2">${score}<span class="text-xl text-gray-400"> / 80点</span></div>
          <div class="w-full bg-white/60 rounded-full h-3 mb-4">
            <div class="h-3 rounded-full bg-gradient-to-r from-indigo-400 to-purple-400 transition-all duration-1000" style="width: ${pct}%"></div>
          </div>
          <p class="text-sm text-gray-600 mb-5">${msg}</p>
          <div class="bg-white/70 rounded-xl p-4 text-left mb-4">
            <p class="text-xs font-bold text-gray-500 mb-2">✅ 正解の順番（高い順）</p>
            <div class="flex flex-wrap gap-1">
              ${CORRECT_ORDER.map((item, i) => `
                <div class="flex items-center gap-1">
                  <span class="text-sm font-bold text-gray-700">${item.emoji}${item.name}</span>
                  ${i < 7 ? '<span class="text-gray-400 text-xs">→</span>' : ''}
                </div>
              `).join('')}
            </div>
          </div>
          <button onclick="resetGame()"
            class="bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold px-8 py-3 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95">
            🔄 もう一度挑戦
          </button>
        </div>
      `;
      panel.classList.remove('hidden');
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ============================
    // リセット
    // ============================
    function resetGame() {
      checked = false;
      initGame();
    }

    // ============================
    // ヘルプモーダル
    // ============================
    document.getElementById('helpBtn').addEventListener('click', () => {
      document.getElementById('helpModal').classList.remove('hidden');
    });
    document.getElementById('helpModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
    });

    // ============================
    // コンフェッティ
    // ============================
    function launchConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const particles = Array.from({ length: 100 }, () => ({
        x: Math.random() * canvas.width,
        y: -20,
        r: Math.random() * 8 + 4,
        color: ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981'][Math.floor(Math.random() * 5)],
        speed: Math.random() * 4 + 2,
        angle: Math.random() * 360,
        spin: Math.random() * 10 - 5,
        opacity: 1,
      }));
      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate((p.angle * Math.PI) / 180);
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();
          p.y += p.speed;
          p.angle += p.spin;
          p.opacity -= 0.008;
        });
        frame++;
        if (frame < 180) requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      draw();
    }

    // ============================
    // 起動
    // ============================
    initGame();
  </script>
</body>
</html>
